# ── Siene — Nginx reverse proxy configuration ─────────────────────────────────
#
# Routing:
#   /v2/          → registry:5000    (Docker Distribution — push/pull)
#   /api/         → backend:8000
#   /accounts/    → backend:8000     (allauth views)
#   /static/      → backend:8000     (WhiteNoise)
#   everything else → frontend:3000
#
# TLS termination is handled here. Certificates are expected at:
#   /etc/nginx/certs/fullchain.pem
#   /etc/nginx/certs/privkey.pem
#
# For Let's Encrypt via certbot:
#   certbot certonly --standalone -d your-domain.com
#   Then mount /etc/letsencrypt/live/your-domain.com/ to /etc/nginx/certs/
# ─────────────────────────────────────────────────────────────────────────────

# Tune for large image uploads (layers can be several GB)
client_max_body_size 0;          # unlimited — registry handles its own limits
proxy_request_buffering  off;    # stream body directly to upstream; don't spool
proxy_buffering          off;    # stream responses back to client immediately

# Upstream definitions
upstream backend  { server backend:8000;  keepalive 32; }
upstream frontend { server frontend:3000; keepalive 16; }
upstream registry { server registry:5000; keepalive 16; }

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenges through (if using certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — enable after confirming everything works
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Common proxy headers ──────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # ── Docker Registry — /v2/ ────────────────────────────────────────────────
    # Must come before other locations because /v2/ is a strict Docker protocol
    # requirement. The registry sends large chunked bodies; don't buffer them.
    location /v2/ {
        proxy_pass         http://registry;
        proxy_read_timeout 900s;   # long timeout for large layer transfers
        proxy_send_timeout 900s;
        proxy_connect_timeout 10s;

        # Docker registry requires these headers to be forwarded correctly
        proxy_set_header   Docker-Distribution-Api-Version registry/2.0;

        # Pass the full URI — the registry is sensitive about path normalization
        proxy_pass_header  Server;
    }

    # ── Backend — /api/ ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Backend — /admin/ ───────────────────────────────────────────────────────
    location /su-admin/ {
        proxy_pass         http://backend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Backend — /accounts/ (allauth views + MFA) ────────────────────────────
    location /accounts/ {
        proxy_pass         http://backend;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Backend — /static/ (WhiteNoise serves CSS/JS/etc.) ───────────────────
    location /static/ {
        proxy_pass         http://backend;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        # Static files are immutable (WhiteNoise hashes filenames) — cache aggressively
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # ── Frontend — everything else ────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Next.js needs upgrade headers for WebSockets (hot-reload in dev)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
