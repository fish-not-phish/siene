<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{% block title %}Siene{% endblock %} — Siene</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <style>
    /* ── Siene design tokens ──────────────────────────────────────────────── */
    :root {
      --s-accent:      #4f8ef7;   /* primary blue */
      --s-accent-dark: #2563eb;
      --s-accent-ring: rgba(79, 142, 247, 0.28);
      --s-bg:          #f4f6fb;
      --s-surface:     #ffffff;
      --s-border:      #e2e8f0;
      --s-text:        #0f172a;
      --s-muted:       #64748b;
      --s-danger:      #ef4444;
      --s-success:     #22c55e;
      --s-warning:     #f59e0b;
    }

    /* ── Reset / layout ───────────────────────────────────────────────────── */
    html, body { height: 100%; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2.5rem 1rem;
      background-color: var(--s-bg);
      color: var(--s-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .s-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem 2rem 1.5rem;
      background: var(--s-surface);
      border: 1px solid var(--s-border);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
    }

    .s-card-wide {
      max-width: 760px;
    }

    /* ── Wordmark / logo ──────────────────────────────────────────────────── */
    .s-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      margin-bottom: 1.5rem;
      text-decoration: none !important;
      color: inherit !important;
    }

    .s-brand-icon {
      flex-shrink: 0;
    }

    .s-brand-name {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -.025em;
      color: var(--s-text);
    }

    /* ── Typography ───────────────────────────────────────────────────────── */
    .s-heading {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--s-text);
      margin-bottom: .35rem;
      text-align: center;
    }

    .s-subtext {
      font-size: .82rem;
      color: var(--s-muted);
      text-align: center;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    /* ── Form controls ────────────────────────────────────────────────────── */
    .form-control {
      border-color: var(--s-border);
      border-radius: 7px;
      padding: .6rem .85rem;
      font-size: .9rem;
      color: var(--s-text);
      background: var(--s-surface);
      transition: border-color .15s, box-shadow .15s;
    }

    .form-control:focus {
      border-color: var(--s-accent);
      box-shadow: 0 0 0 3px var(--s-accent-ring);
      outline: none;
    }

    .form-control.is-invalid {
      border-color: var(--s-danger);
    }

    .invalid-feedback {
      font-size: .78rem;
      color: var(--s-danger);
    }

    .form-group label,
    .sr-only + .form-control { margin-bottom: .6rem; }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn {
      border-radius: 7px;
      font-size: .875rem;
      font-weight: 500;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }

    .btn-primary {
      background-color: var(--s-accent);
      border-color: var(--s-accent);
      color: #fff;
    }

    .btn-primary:hover,
    .btn-primary:focus {
      background-color: var(--s-accent-dark);
      border-color: var(--s-accent-dark);
      box-shadow: 0 0 0 3px var(--s-accent-ring);
    }

    .btn-outline-secondary {
      border-color: var(--s-border);
      color: var(--s-muted);
    }

    .btn-outline-secondary:hover {
      background-color: var(--s-bg);
      color: var(--s-text);
    }

    .btn-outline-danger {
      border-color: var(--s-danger);
      color: var(--s-danger);
    }

    .btn-outline-danger:hover {
      background-color: var(--s-danger);
      color: #fff;
    }

    .btn-danger {
      background-color: var(--s-danger);
      border-color: var(--s-danger);
      color: #fff;
    }

    .btn-link {
      color: var(--s-accent);
      font-size: .82rem;
    }

    .btn-link:hover { color: var(--s-accent-dark); }

    /* ── Links ────────────────────────────────────────────────────────────── */
    a { color: var(--s-accent); }
    a:hover { color: var(--s-accent-dark); text-decoration: none; }

    /* ── Alerts / messages ────────────────────────────────────────────────── */
    .alert {
      border-radius: 7px;
      font-size: .84rem;
    }

    .alert-danger  { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .alert-success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
    .alert-info    { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
    .alert-warning { background: #fffbeb; border-color: #fde68a; color: #92400e; }

    /* ── Badges ───────────────────────────────────────────────────────────── */
    .badge-success { background-color: var(--s-success); }
    .badge-warning { background-color: var(--s-warning); color: #1c1917; }
    .badge-info    { background-color: var(--s-accent); }
    .badge-danger  { background-color: var(--s-danger); }

    /* ── Divider ──────────────────────────────────────────────────────────── */
    hr { border-color: var(--s-border); }

    /* ── Footer copyright ─────────────────────────────────────────────────── */
    .s-footer {
      margin-top: 1.75rem;
      font-size: .75rem;
      color: var(--s-muted);
      text-align: center;
    }

    /* ── Recovery code grid ───────────────────────────────────────────────── */
    .recovery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .4rem .75rem;
      font-family: monospace;
      font-size: .9rem;
      background: var(--s-bg);
      border: 1px solid var(--s-border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      text-align: left;
      margin-bottom: 1rem;
    }

    /* ── QR code box ──────────────────────────────────────────────────────── */
    .qr-box {
      background: var(--s-bg);
      border: 1px solid var(--s-border);
      border-radius: 8px;
      padding: 1.25rem;
      display: inline-block;
    }

    /* ── TOTP app cards ───────────────────────────────────────────────────── */
    .app-card {
      border: 1px solid var(--s-border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      height: 100%;
    }

    .app-card h6 { font-weight: 600; margin-bottom: .75rem; }
  </style>
</head>
<body>

  {% block body %}
  <div class="s-card {% block card_class %}{% endblock %}">

    {# ── Siene wordmark ── #}
    <a href="/" class="s-brand">
      <svg class="s-brand-icon" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#4f8ef7"/>
        <path d="M9 11C9 9.895 9.895 9 11 9h10a2 2 0 0 1 2 2v1.5a1 1 0 0 1-1 1H11a2 2 0 0 0-2 2V21a2 2 0 0 0 2 2h10c1.105 0 2-.895 2-2v-1.5a1 1 0 0 0-1-1H12a1 1 0 0 1-1-1v-1a1 1 0 0 1 1-1h9a3 3 0 0 1 3 3V21a4 4 0 0 1-4 4H11a4 4 0 0 1-4-4v-8a2 2 0 0 1 2-2z" fill="white"/>
      </svg>
      <span class="s-brand-name">Siene</span>
    </a>

    {% block card_content %}{% endblock %}

    <p class="s-footer">&copy; {% now "Y" %} Siene. All rights reserved.</p>
  </div>
  {% endblock body %}

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js" integrity="sha384-M6e/DU3CtaSB3aCW3V4uMfDDP09r1h8/1j3e9LXaLi1K/7gPmrYm9J5AZx8OCBV" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
